# Splunk Universal Forwarder - inputs.conf (Ubuntu)
# Location: /opt/splunkforwarder/etc/system/local/inputs.conf
# Replace <HOSTNAME> with your Ubuntu VM's hostname (run: hostname)

[monitor:///var/log/auth.log]
disabled = false
index = main
sourcetype = linux_secure
host = <HOSTNAME>

[monitor:///var/log/syslog]
disabled = false
index = main
sourcetype = linux_syslog
host = <HOSTNAME>

[monitor:///var/log/kern.log]
disabled = false
index = main
sourcetype = linux_kernel
host = <HOSTNAME>
