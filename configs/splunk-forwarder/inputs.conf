# Splunk Universal Forwarder - inputs.conf (Windows Server)
# Location: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf

# Windows Security Log
# Captures: logons (4624), failed logons (4625), account lockout (4740),
#           privilege use (4672), process creation (4688), account management (4720)
[WinEventLog://Security]
disabled = 0
renderXml = false
index = windows
sourcetype = WinEventLog

# PowerShell Operational Log
# Captures: Script Block Logging (4104), Module Logging (4103)
[WinEventLog://Microsoft-Windows-PowerShell/Operational]
disabled = 0
renderXml = true
index = windows
sourcetype = WinEventLog

# Sysmon Operational Log
# Captures: Process Create (1), Network Connect (3), DNS (22), File Create (11), Registry (12/13)
[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = 0
renderXml = false
index = sysmon
sourcetype = WinEventLog

# Windows System Log (optional - service installs 7045, system errors)
[WinEventLog://System]
disabled = 0
renderXml = false
index = windows
sourcetype = WinEventLog
